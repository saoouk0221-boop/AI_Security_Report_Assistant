name: Generate Security Report

on:
  push:
    branches: [main]
    paths-ignore:
      - "reports/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate security report
        run: python main.py

      - name: Commit generated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/Security_Report.md
          git diff --cached --quiet || git commit -m "Generate security report [skip ci]"
          git push